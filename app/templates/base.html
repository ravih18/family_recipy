<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Family Recipes{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-amber-50 min-h-screen font-sans">

    <nav class="bg-amber-700 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight">🍽️ Recettes de famille</a>
            <div class="flex gap-3 items-center">
                <a href="/add" class="bg-white text-amber-700 font-semibold px-4 py-2 rounded-lg hover:bg-amber-100 transition">
                    + Ajouter une recette
                </a>
                <a href="/logout" class="text-amber-200 hover:text-white text-sm transition">
                    Déconnexion
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-amber-400 text-sm py-6 mt-8">
        Fait avec ❤️ pour la famille
    </footer>

</body>
</html>
