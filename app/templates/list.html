{% extends "base.html" %}

{% block title %}Toutes les recettes{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-amber-800">Nos recettes</h1>
</div>

<!-- Barre de recherche et filtres -->
<div class="bg-white rounded-2xl shadow-sm border border-amber-100 p-5 mb-8 space-y-4">

    <!-- Recherche -->
    <input
        type="text"
        id="search-input"
        placeholder="🔍 Rechercher une recette..."
        class="w-full border border-gray-200 rounded-xl px-5 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-amber-400"
    >

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">

        <!-- Filtre origine -->
        <div>
            <label class="block text-xs font-semibold text-amber-800 mb-1">🌍 Origine</label>
            <select id="filter-origin" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                <option value="">Toutes les origines</option>
                {% for tag in all_tags.origin %}
                <option value="{{ tag.id }}">{{ tag.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Filtre type -->
        <div>
            <label class="block text-xs font-semibold text-amber-800 mb-1">🍴 Type de plat</label>
            <select id="filter-type" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                <option value="">Tous les types</option>
                {% for tag in all_tags.type %}
                <option value="{{ tag.id }}">{{ tag.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Filtre végétarien -->
        <div class="flex items-end pb-1">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="filter-vege" class="accent-amber-600 w-4 h-4">
                <span class="text-sm text-gray-700">🥗 Végétarien uniquement</span>
            </label>
        </div>

        <!-- Tri -->
        <div>
            <label class="block text-xs font-semibold text-amber-800 mb-1">↕️ Trier par</label>
            <select id="sort-select" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                <option value="recent">Plus récent d'abord</option>
                <option value="oldest">Plus ancien d'abord</option>
                <option value="alpha">Ordre alphabétique</option>
                <option value="type">Par type de plat</option>
            </select>
        </div>

    </div>
</div>

<!-- Grille de recettes -->
<div id="recipe-grid">
    {% include "partials/recipe_list.html" %}
</div>

<script>
    // Récupère les ids cochés pour végétarien
    {% for tag in all_tags.diet %}
        {% if tag.name == "Végétarien" %}
        const VEGE_TAG_ID = {{ tag.id }};
        {% endif %}
    {% endfor %}

    function fetchRecipes() {
        const q = document.getElementById('search-input').value;
        const origin = document.getElementById('filter-origin').value;
        const type = document.getElementById('filter-type').value;
        const vege = document.getElementById('filter-vege').checked;
        const sort = document.getElementById('sort-select').value;

        const params = new URLSearchParams();
        if (q) params.append('q', q);
        if (origin) params.append('tags', origin);
        if (type) params.append('tags', type);
        if (vege && typeof VEGE_TAG_ID !== 'undefined') params.append('tags', VEGE_TAG_ID);
        params.append('sort', sort);

        fetch('/search?' + params.toString())
            .then(r => r.text())
            .then(html => {
                document.getElementById('recipe-grid').innerHTML = html;
            });
    }

    // Debounce pour la recherche texte
    let debounceTimer;
    document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fetchRecipes, 300);
    });

    // Immédiat pour les selects et checkbox
    document.getElementById('filter-origin').addEventListener('change', fetchRecipes);
    document.getElementById('filter-type').addEventListener('change', fetchRecipes);
    document.getElementById('filter-vege').addEventListener('change', fetchRecipes);
    document.getElementById('sort-select').addEventListener('change', fetchRecipes);
</script>

{% endblock %}
